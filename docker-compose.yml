services:
  postgres:
    image: postgres:16
    container_name: fleet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fleet
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d fleet"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fleet-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fleet-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fleet-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/fleet
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      WEBHOOK_URL: https://webhook.site/your-uuid
      PORT: 3000
    ports:
      - "3030:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    container_name: fleet-simulator
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      SIMULATOR_GPS_MIN_INTERVAL: 2
      SIMULATOR_GPS_MAX_INTERVAL: 5
      SIMULATOR_EVENTS_PER_MINUTE_MIN: 1
      SIMULATOR_EVENTS_PER_MINUTE_MAX: 2
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fleet-frontend
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
